<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Threat Intelligence Dashboard</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet" />
</head>
<body>
    <div class="app-container">
        <!-- NAVBAR -->
        <header class="topbar">
            <div class="topbar-left">
                <span class="logo-icon">🛡️</span>
                <span class="logo-text">THREAT INTEL</span>
            </div>
            <div class="topbar-right">
                <span class="time-display" id="time-display"></span>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <div class="content-wrapper">
                <!-- SEARCH SECTION -->
                <section class="search-section">
                    <form id="lookup-form">
                        <div class="search-row">
                            <input id="query-input" type="text"
                                placeholder="Enter domain, IP, or URL..."
                                class="search-input" autocomplete="off" />
                            <button type="submit" class="btn-primary">Analyze</button>
                        </div>
                        <div class="search-ghost-actions">
                            <button type="button" class="btn-ghost" id="defang-btn">⚔️ Defang</button>
                            <button type="button" class="btn-ghost" id="clear-btn">✕ Clear</button>
                            <button type="button" class="btn-ghost" id="export-btn">↓ Export</button>
                        </div>
                    </form>
                    <div id="search-status" class="status-message"></div>
                </section>

                <!-- SUMMARY BAR -->
                <div id="summary-bar" class="summary-bar hidden">
                    <div class="summary-item">
                        <span class="summary-label">Target</span>
                        <span class="summary-value" id="sum-target">—</span>
                    </div>
                    <div class="summary-sep"></div>
                    <div class="summary-item">
                        <span class="summary-label">Threat Score</span>
                        <span class="summary-value" id="sum-score">—</span>
                    </div>
                    <div class="summary-sep"></div>
                    <div class="summary-item">
                        <span class="summary-label">Risk Level</span>
                        <span class="summary-value" id="sum-level">—</span>
                    </div>
                    <div class="summary-sep"></div>
                    <div class="summary-item">
                        <span class="summary-label">Sources</span>
                        <span class="summary-value" id="sum-sources">—</span>
                    </div>
                    <div class="summary-sep"></div>
                    <div class="summary-item">
                        <span class="summary-label">Scan Time</span>
                        <span class="summary-value" id="sum-time">—</span>
                    </div>
                </div>

                <!-- THREAT SCORE GAUGE -->
                <div id="gauge-section" class="gauge-section hidden">
                    <div class="gauge-bar-track">
                        <div id="gauge-fill" class="gauge-fill"></div>
                    </div>
                    <div class="gauge-labels">
                        <span>0 — Safe</span>
                        <span>25</span>
                        <span>50</span>
                        <span>70 — Critical</span>
                        <span>100</span>
                    </div>
                </div>

                <!-- INTEL CARDS GRID -->
                <div id="results-grid" class="results-grid"></div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>
    <script src="/static/script.js"></script>
</body>
</html>
