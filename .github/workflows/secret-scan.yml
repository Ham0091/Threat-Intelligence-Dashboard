name: Secret Scanning

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  detect-secrets:
    name: Detect Exposed Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for new secrets
        run: |
          # Scan current code and compare against the committed baseline.
          # Fails if any new, unaudited potential secrets are introduced.
          detect-secrets scan --baseline .secrets.baseline
          python3 - <<'EOF'
          import json, sys

          with open('.secrets.baseline') as f:
              baseline = json.load(f)

          new_secrets = []
          for filename, secrets in baseline.get('results', {}).items():
              for secret in secrets:
                  # Flag any secret not explicitly marked as a known false positive
                  if secret.get('is_secret') is not False:
                      new_secrets.append(
                          f"  {filename}:{secret['line_number']} ({secret['type']})"
                      )

          if new_secrets:
              print("ERROR: Potential secrets detected that have not been audited:")
              print('\n'.join(new_secrets))
              print()
              print("If these are false positives, run:")
              print("  detect-secrets audit .secrets.baseline")
              print("and mark each finding as not a secret, then commit the updated baseline.")
              sys.exit(1)
          else:
              print("No new secrets detected.")
          EOF
